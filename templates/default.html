    />

      <div class="nav-inner">

    <main>

    <script src="main.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Click-to-copy install boxes
        document.querySelectorAll(".install").forEach(function (el) {
          el.addEventListener("click", function () {
            var text = el.querySelector("code")
              ? el.querySelector("code").textContent
              : "";
            if (!text) return;
            navigator.clipboard.writeText(text).catch(function () {});
            el.classList.add("copied");
            var existing = el.parentNode.querySelector(".copied-label");
            if (!existing) {
              var label = document.createElement("span");
              label.className = "copied-label";
              label.textContent = "Copied!";
              el.insertAdjacentElement("afterend", label);
              existing = label;
            }
            existing.classList.add("visible");
            clearTimeout(el._copyTimer);
            el._copyTimer = setTimeout(function () {
              el.classList.remove("copied");
              existing.classList.remove("visible");
            }, 1200);
          });
        });
      });
    </script>
  </body>
</html>
